name: Build/release

on:
  push:
    tags:
      - '*@*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build all apps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx nx run-many --target=build --configuration=release