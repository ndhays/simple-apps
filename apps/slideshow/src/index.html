<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' file:; style-src 'unsafe-inline';">
  <title>Slideshow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    button, input, #drawer, #file-list, #slide-img, #controls {
      -webkit-app-region: no-drag;
    }

    /* ── Drop screen ── */
    #drop-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: #0a0a0a;
      z-index: 100;
      -webkit-app-region: no-drag;
    }
    #drop-screen.drag-over { background: #111; }
    #drop-screen .drop-icon { opacity: 0.3; margin-bottom: 8px; }
    #drop-screen h1 { font-size: 22px; font-weight: 500; opacity: 0.8; }
    #drop-screen p { font-size: 14px; opacity: 0.4; }
    #open-btn {
      margin-top: 8px;
      padding: 10px 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #open-btn:hover { background: rgba(255,255,255,0.18); }

    /* ── Main app ── */
    #app {
      display: none;
      width: 100vw; height: 100vh;
      position: relative;
    }

    /* ── Slide image ── */
    #slide-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      transition: opacity 0.3s;
    }

    /* ── Drawer ── */
    #drawer {
      position: fixed;
      top: 0; right: 0;
      width: 220px; height: 100%;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.08);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 50;
      display: flex; flex-direction: column;
    }
    #drawer.open { transform: translateX(0); }

    #drawer-header {
      padding: 16px 14px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      -webkit-app-region: no-drag;
    }
    #drawer-header span { font-size: 12px; opacity: 0.5; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }

    #shuffle-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.08);
      border: none; color: #fff;
      padding: 5px 10px; border-radius: 12px;
      font-size: 12px; cursor: pointer;
      transition: background 0.2s;
    }
    #shuffle-btn:hover { background: rgba(255,255,255,0.15); }

    #file-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #file-list::-webkit-scrollbar { width: 4px; }
    #file-list::-webkit-scrollbar-track { background: transparent; }
    #file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .file-item {
      padding: 7px 14px;
      font-size: 12px;
      opacity: 0.55;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 6px;
      margin: 0 6px;
      transition: background 0.15s, opacity 0.15s;
    }
    .file-item:hover { background: rgba(255,255,255,0.07); opacity: 0.9; }
    .file-item.active { background: rgba(255,255,255,0.12); opacity: 1; font-weight: 500; }

    /* ── Controls ── */
    #controls {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 4px;
      background: rgba(20,20,20,0.8);
      backdrop-filter: blur(20px);
      padding: 8px 14px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 40;
      transition: opacity 0.4s;
      white-space: nowrap;
    }
    #controls.hidden { opacity: 0; pointer-events: none; }

    .ctrl-btn {
      background: none; border: none;
      color: #fff; cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      opacity: 0.65;
      transition: opacity 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn svg { display: block; }
    .ctrl-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    .ctrl-btn.active { opacity: 1; background: rgba(255,255,255,0.08); }

    .divider { width: 1px; height: 18px; background: rgba(255,255,255,0.15); margin: 0 4px; flex-shrink: 0; }

    #counter { font-size: 12px; opacity: 0.45; min-width: 52px; text-align: center; }

    #speed-wrap { display: flex; align-items: center; gap: 5px; font-size: 12px; opacity: 0.6; padding: 0 2px; }
    #interval-input {
      width: 36px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: #fff;
      text-align: center; border-radius: 6px; padding: 3px 4px;
      font-size: 12px;
    }

    /* ── Filename overlay ── */
    #filename {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      background: rgba(0,0,0,0.55);
      padding: 5px 14px; border-radius: 10px;
      pointer-events: none;
      z-index: 35;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }
    /* flash mode: fades in then out */
    #filename.flash { opacity: 0.75; }
    /* always mode: always visible */
    #filename.always { opacity: 0.75; transition: none; }
  </style>
</head>
<body>

  <!-- Drop screen -->
  <div id="drop-screen">
    <svg class="drop-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
    </svg>
    <h1>Drop a folder of images</h1>
    <p>or</p>
    <button id="open-btn">Choose Folder…</button>
  </div>

  <!-- Main app -->
  <div id="app">
    <img id="slide-img" draggable="false">

    <!-- Drawer -->
    <div id="drawer">
      <div id="drawer-header">
        <span id="file-count">0 images</span>
        <button id="shuffle-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="9" height="9" rx="1.5"/>
            <rect x="13" y="2" width="9" height="9" rx="1.5"/>
            <rect x="13" y="13" width="9" height="9" rx="1.5"/>
            <rect x="2" y="13" width="9" height="9" rx="1.5"/>
            <circle cx="6.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
            <circle cx="6.5" cy="17.5" r="1" fill="currentColor" stroke="none"/>
            <circle cx="17.5" cy="17.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
          Shuffle
        </button>
      </div>
      <div id="file-list"></div>
    </div>

    <!-- Controls -->
    <div id="controls">

      <!-- Prev -->
      <button class="ctrl-btn" id="prev-btn" title="Previous (←)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
        </svg>
      </button>

      <!-- Play/Pause -->
      <button class="ctrl-btn" id="play-btn" title="Play/Pause (Space)">
        <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>

      <!-- Next -->
      <button class="ctrl-btn" id="next-btn" title="Next (→)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>

      <div class="divider"></div>
      <span id="counter">–</span>
      <div class="divider"></div>

      <!-- Speed -->
      <div id="speed-wrap">
        <input id="interval-input" type="number" value="4" min="1" max="60" title="Seconds per slide">
        <span>s</span>
      </div>

      <div class="divider"></div>

      <!-- Filename toggle: cycles off → flash → always -->
      <button class="ctrl-btn" id="filename-btn" title="Filename display (N)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </button>

      <!-- Drawer -->
      <button class="ctrl-btn" id="drawer-btn" title="File list (D)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>

      <!-- Fullscreen -->
      <button class="ctrl-btn" id="fs-btn" title="Fullscreen (F)">
        <svg id="icon-expand" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        <svg id="icon-compress" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
          <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
        </svg>
      </button>

    </div>

    <div id="filename"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
